<!DOCTYPE html>
<html>
<head>
  <title>ZipLink - URL Shortener</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🔗 ZipLink</h1>

  <div class="input-group">
    <input type="text" id="urlInput" placeholder="Enter your long URL..." />
  </div>

  <!-- 🔥 NEW: Custom Alias -->
  <div class="input-group">
    <input type="text" id="alias" placeholder="Custom alias (optional)" />
  </div>

  <button id="shortenBtn">Shorten</button>

  <!-- RESULT -->
  <div id="result"></div>
</div>

<script src="/script.js"></script>
</body>
</html>
